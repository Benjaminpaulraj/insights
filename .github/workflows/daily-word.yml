name: Generate Daily Word

on:
  # Manual trigger only — daily publishing is handled by Claude Code Routine
  workflow_dispatch:
    inputs:
      word:
        description: 'Force a specific word (leave blank to let Claude pick)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — generate but do not commit'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate-word:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate daily word
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FLAGS=""
          if [ -n "${{ github.event.inputs.word }}" ]; then
            FLAGS="--word ${{ github.event.inputs.word }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          node scripts/generate-daily-word.mjs $FLAGS

      - name: Commit and push new word
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "Daily Word Bot"
          git config user.email "actions@github.com"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "No new word file generated, nothing to commit."
          else
            git commit -m "feat: daily word for $(date +%Y-%m-%d)"
            git push
          fi
